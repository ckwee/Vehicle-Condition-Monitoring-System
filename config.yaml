# Vehicle Condition Monitoring System Configuration

system:
  name: "Vehicle Condition Monitoring System"
  version: "2.0.0"
  environment: "production"  # development, staging, production
  debug: false
  log_level: "INFO"

database:
  type: "timescaledb"  # postgresql, timescaledb
  connection_pool_size: 20
  max_overflow: 10
  echo: false
  
redis:
  enabled: true
  max_connections: 50
  socket_timeout: 5

agents:
  data_collection:
    enabled: true
    sources:
      - type: "simulated"
        enabled: true
        vehicles: ["VEH001", "VEH002", "VEH003"]
      - type: "obd2"
        enabled: false
        port: "/dev/ttyUSB0"
        baudrate: 38400
      - type: "mqtt"
        enabled: false
        broker: "localhost"
        port: 1883
      - type: "api"
        enabled: false
        endpoint: "https://api.vehicledata.com/v2"
        api_key: "${API_KEY}"
    
  preprocessing:
    enabled: true
    window_size: 100
    outlier_method: "zscore"  # zscore, iqr, isolation_forest
    outlier_threshold: 3
    missing_data_strategy: "interpolate"  # drop, interpolate, forward_fill
    
  anomaly_detection:
    enabled: true
    models:
      - name: "isolation_forest"
        enabled: true
        contamination: 0.1
        n_estimators: 100
      - name: "lstm_autoencoder"
        enabled: false
        sequence_length: 50
        threshold_percentile: 95
      - name: "statistical"
        enabled: true
        zscore_threshold: 3
        ewma_alpha: 0.1
    
  diagnosis:
    enabled: true
    use_llm: true
    llm_model: "gpt-4"
    rule_based_enabled: true
    confidence_threshold: 0.7
    
  alert:
    enabled: true
    channels:
      email:
        enabled: true
        provider: "sendgrid"
      sms:
        enabled: true
        provider: "twilio"
      push:
        enabled: true
        provider: "firebase"
      telegram:
        enabled: false
      dashboard:
        enabled: true

dashboard:
  port: 8501
  theme: "dark"
  auto_refresh: true
  refresh_interval: 2  # seconds
  charts:
    max_data_points: 1000
    default_time_range: "1h"  # 15m, 30m, 1h, 6h, 24h
  alerts:
    max_display: 100
    auto_acknowledge_timeout: 3600  # seconds